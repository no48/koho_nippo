databases:
  - name: track-db
    plan: free
    databaseName: track_db
    user: track_user

services:
  - type: web
    name: track
    runtime: node
    plan: free
    buildCommand: NODE_ENV=development npm ci && npx prisma generate && npx prisma migrate deploy && npx prisma db seed && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: track-db
          property: connectionString
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      # メール機能を有効化する場合は以下を追加:
      # - key: EMAIL_FROM
      #   sync: false
